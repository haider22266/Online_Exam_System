{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Generate Questions</h1>
<form method="post" class="form-panel">
  <label class="form-label">Course</label>
  <select class="form-select mb-3" name="course_id" required>{% for course in courses %}<option value="{{ course.id }}">{{ course.title }}</option>{% endfor %}</select>
  <label class="form-label">Topic</label>
  <input class="form-control mb-3" name="topic" required>
  <label class="form-label">Number of Questions</label>
  <input class="form-control mb-3" type="number" name="count" min="1" max="50" value="5">
  <label class="form-label">Difficulty</label>
  <select class="form-select mb-3" name="difficulty"><option>Easy</option><option selected>Medium</option><option>Hard</option></select>
  <label class="form-label">Question Type</label>
  <select class="form-select mb-3" name="question_type"><option>Multiple Choice</option><option>Short Answer</option><option>Descriptive</option><option>Programming</option></select>
  <button class="btn btn-primary" type="submit">Generate</button>
</form>
{% endblock %}
