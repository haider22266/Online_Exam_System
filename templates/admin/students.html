{% extends "base.html" %}
{% block content %}
<div class="row g-4">
  <div class="col-lg-5">
    <h1 class="page-title">Create Student Account</h1>
    <form method="post" class="form-panel">
      <label class="form-label">Student name</label>
      <input class="form-control mb-3" name="name" required>
      <label class="form-label">Email</label>
      <input class="form-control mb-3" type="email" name="email" required>
      <label class="form-label">Temporary password</label>
      <input class="form-control mb-3" type="password" name="password" minlength="8" required>
      <button class="btn btn-primary" type="submit">Create Student</button>
    </form>
  </div>
  <div class="col-lg-7">
    <h2 class="page-title">Students</h2>
    <table class="table table-hover bg-white">
      <thead><tr><th>Name</th><th>Email</th><th>Active</th></tr></thead>
      <tbody>
      {% for student in students %}
      <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ "Yes" if student.is_active else "No" }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center text-muted">No students created.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
