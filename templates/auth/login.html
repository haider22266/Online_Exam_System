{% extends "base.html" %}
{% block title %}Login - AI Exam Generator{% endblock %}
{% block content %}
<div class="auth-shell">
  <form class="auth-panel" method="post">
    <h1>AI Exam Generator</h1>
    <label class="form-label">Email</label>
    <input class="form-control mb-3" type="email" name="email" required autofocus>
    <label class="form-label">Password</label>
    <input class="form-control mb-3" type="password" name="password" required>
    <button class="btn btn-primary w-100" type="submit">Sign in</button>
    <div class="small text-muted mt-3">
      Admin: admin@example.com / Admin@12345<br>
      Teacher: teacher@example.com / Teacher@12345<br>
      Student: student@example.com / Student@12345
    </div>
  </form>
</div>
{% endblock %}
