{% extends "base.html" %}
{% block content %}
<h1 class="page-title">Create Online Exam</h1>
<form method="post" class="form-panel">
  <label class="form-label">Title</label>
  <input class="form-control mb-3" name="title" required>
  <label class="form-label">Course</label>
  <select class="form-select mb-3" name="course_id" required>{% for course in courses %}<option value="{{ course.id }}">{{ course.title }}</option>{% endfor %}</select>
  <label class="form-label">Exam Type</label>
  <select class="form-select mb-3" name="exam_type" required>
    <option value="mcq">MCQ — automatically graded</option>
    <option value="written">Written — graded by teacher</option>
  </select>
  <label class="form-label">Duration (minutes)</label>
  <input class="form-control mb-3" type="number" name="duration_minutes" min="1" max="360" value="30" required>
  <div class="row">
    <div class="col-md-4"><label class="form-label">Easy</label><input class="form-control mb-3" type="number" name="easy_count" min="0" value="2"></div>
    <div class="col-md-4"><label class="form-label">Medium</label><input class="form-control mb-3" type="number" name="medium_count" min="0" value="2"></div>
    <div class="col-md-4"><label class="form-label">Hard</label><input class="form-control mb-3" type="number" name="hard_count" min="0" value="1"></div>
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="is_published" id="is_published">
    <label class="form-check-label" for="is_published">Publish immediately for students</label>
  </div>
  <button class="btn btn-primary" type="submit">Create</button>
</form>
{% endblock %}
