{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="page-title">Teacher Dashboard</h1>
  <div class="btn-group">
    <a class="btn btn-primary" href="{{ url_for('documents.upload') }}">Upload</a>
    <a class="btn btn-outline-primary" href="{{ url_for('questions.generate') }}">Generate</a>
    <a class="btn btn-outline-primary" href="{{ url_for('exams.create') }}">Create Exam</a>
  </div>
</div>
<div class="stats-grid">
  {% for label, value in stats.items() %}
  <div class="stat-card"><span>{{ label|title }}</span><strong>{{ value }}</strong></div>
  {% endfor %}
</div>
{% endblock %}
